name: Deploy to InfinityFree

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      # Writes a .htaccess so React Router client-side routes don't 404
      # on hard refresh or direct URL access. InfinityFree runs Apache.
      - name: Write .htaccess for SPA routing
        run: |
          {
            echo 'Options -MultiViews'
            echo 'RewriteEngine On'
            echo 'RewriteCond %{REQUEST_FILENAME} !-f'
            echo 'RewriteCond %{REQUEST_FILENAME} !-d'
            echo 'RewriteRule ^ index.html [QSA,L]'
          } > dist/.htaccess

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Adjust this path to match your InfinityFree document root
          server-dir: /webftp.ct.ws/htdocs/
          local-dir: ./dist/
          # Clean slate ensures old hashed asset files don't accumulate
          dangerous-clean-slate: true
